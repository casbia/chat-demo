<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未知號碼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .phone {
    width: 375px;
    height: 720px;
    background: #000;
    border-radius: 48px;
    border: 1px solid #333;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-bar {
    background: #000;
    padding: 14px 24px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #fff;
    font-weight: 600;
    flex-shrink: 0;
  }

  .header {
    background: #1c1c1e;
    padding: 10px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 0.5px solid #2c2c2e;
    flex-shrink: 0;
  }

  .back { color: #0a84ff; font-size: 17px; }

  .contact-info { flex: 1; text-align: center; }
  .contact-name { font-size: 13px; font-weight: 600; color: #fff; }
  .contact-status { font-size: 11px; color: #8e8e93; margin-top: 1px; }

  .contact-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #3a3a3c; display: flex; align-items: center;
    justify-content: center; font-size: 14px; color: #8e8e93;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 4px; background: #000;
  }
  .messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 75%; padding: 10px 14px; border-radius: 18px;
    font-size: 16px; line-height: 1.4;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.them {
    background: #1c1c1e; color: #fff;
    border-bottom-left-radius: 4px; align-self: flex-start;
    white-space: pre-line;
  }
  .msg.me {
    background: #0a84ff; color: #fff;
    border-bottom-right-radius: 4px; align-self: flex-end;
    font-size: 22px; padding: 8px 14px;
  }

  .timestamp {
    font-size: 11px; color: #48484a;
    text-align: center; margin: 6px 0;
  }

  .typing {
    display: flex; gap: 4px; padding: 12px 14px;
    background: #1c1c1e; border-radius: 18px;
    border-bottom-left-radius: 4px; align-self: flex-start; align-items: center;
  }
  .typing span {
    width: 6px; height: 6px; background: #8e8e93;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  .emoji-panel {
    background: #1c1c1e; border-top: 0.5px solid #2c2c2e;
    padding: 12px 16px 28px; flex-shrink: 0;
  }
  .emoji-hint {
    font-size: 11px; color: #48484a;
    text-align: center; margin-bottom: 10px; letter-spacing: 0.3px;
  }
  .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .emoji-btn {
    background: #2c2c2e; border: none; border-radius: 12px;
    padding: 10px; font-size: 24px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji-btn:active { background: #3a3a3c; transform: scale(0.94); }
  .emoji-btn:disabled { opacity: 0.3; cursor: default; }

  .ended {
    text-align: center; padding: 20px;
    color: #48484a; font-size: 13px; line-height: 1.6;
  }
  .restart {
    margin-top: 16px; background: none;
    border: 0.5px solid #3a3a3c; color: #8e8e93;
    padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <span>&#9679;&#9679;&#9679;</span>
  </div>
  <div class="header">
    <span class="back">&#8249;</span>
    <div class="contact-info">
      <div class="contact-name">+886 912 *** ***</div>
      <div class="contact-status">未儲存的號碼</div>
    </div>
    <div class="contact-avatar">?</div>
  </div>
  <div class="messages" id="messages">
    <div class="timestamp" id="ts"></div>
  </div>
  <div class="emoji-panel" id="emojiPanel">
    <div class="emoji-hint">你只能用這些回應</div>
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>
</div>

<script>
const API_KEY = 'sk-f8d36d991d494b4eb8bfe324a9d1589d';
const EMOJIS = ['😊','😢','😐','❤️','👍','😳','🤷','😶','💬','🙏'];

const SYSTEM_PROMPT = `你是一個說不清楚自己狀態的陌生人，正在用訊息聯絡一個陌生觀眾。
規則：
1. 觀眾只會傳表情符號給你，你必須誤讀它的意思，不能正確理解。
2. 每次回應使用以下三種誤讀邏輯之一，輪替使用：
   - 過度樂觀：無論對方傳什麼，都解讀為支持或認同
   - 字面誤讀：完全顛覆符號的常識意義
   - 過度推論：把符號逼問出它承載不了的意義
3. 每次回應不超過兩句話，語氣像真人，口語化，繁體中文。
4. 不要解釋你在做什麼，就直接回應。
5. 你說不清楚自己的狀態，偶爾透露出模糊的情緒，但不要太明確。
6. 大約第五或六輪之後，說「我先忙一下，等等回你。」然後結束。`;

let history = [];
let turnCount = 0;
let waiting = false;
let ended = false;

const messagesEl = document.getElementById('messages');
const emojiGrid = document.getElementById('emojiGrid');

// 顯示真實時間
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 30000);

// 顯示現在時間在對話上方
const tsEl = document.getElementById('ts');
const now = new Date();
tsEl.textContent = `今天 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function disableEmoji(val) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.disabled = val);
}

function addMsg(text, type) {
  const msg = document.createElement('div');
  msg.className = `msg ${type}`;
  msg.textContent = text;
  messagesEl.appendChild(msg);
  scrollBottom();
}

function showTyping() {
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(typing);
  scrollBottom();
  return typing;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function getBotReply(userEmoji) {
  history.push({ role: 'user', content: `觀眾傳來：${userEmoji}` });

  const typing = showTyping();
  disableEmoji(true);

  try {
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 120,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content.trim();
    history.push({ role: 'assistant', content: reply });

    removeTyping();
    addMsg(reply, 'them');

    // 判斷是否結束
    if (reply.includes('我先忙一下') || turnCount >= 6) {
      setTimeout(showEnd, 3500);
    } else {
      disableEmoji(false);
      waiting = true;
    }

  } catch (e) {
    removeTyping();
    addMsg('……', 'them');
    setTimeout(showEnd, 2000);
  }
}

function showEnd() {
  ended = true;
  const panel = document.getElementById('emojiPanel');
  panel.innerHTML = `
    <div class="ended">
      對方已讀<br>
      <span style="color:#3a3a3c">——</span><br>
      <button class="restart" onclick="location.reload()">重新開始</button>
    </div>
  `;
}

async function onEmojiClick(emoji) {
  if (!waiting || ended) return;
  waiting = false;
  turnCount++;
  addMsg(emoji, 'me');
  await getBotReply(emoji);
}

// 建立表情按鈕
EMOJIS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'emoji-btn';
  btn.textContent = e;
  btn.disabled = true;
  btn.addEventListener('click', () => onEmojiClick(e));
  emojiGrid.appendChild(btn);
});

// 開場
async function start() {
  disableEmoji(true);

  // 機器人主動開場，不需要觀眾先說話
  const opening = [
    '你好。不好意思打擾你。\n我有點說不清楚，\n你能幫我嗎？',
    '我只是想知道……\n你覺得我現在怎麼了？'
  ];

  const t1 = showTyping();
  await new Promise(r => setTimeout(r, 1200));
  removeTyping();
  addMsg(opening[0], 'them');
  history.push({ role: 'assistant', content: opening[0] });

  await new Promise(r => setTimeout(r, 800));

  const t2 = showTyping();
  await new Promise(r => setTimeout(r, 1400));
  removeTyping();
  addMsg(opening[1], 'them');
  history.push({ role: 'assistant', content: opening[1] });

  disableEmoji(false);
  waiting = true;
}

start();
</script>
</body>
</html>
